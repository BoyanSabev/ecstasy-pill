<html><head></head><body><div id="stage" style="width:100%;height:520px;position:relative;cursor:none;overflow:hidden;border-radius:12px;">
  <canvas id="c" style="width: 2110px; height: 520px; display: block;" width="4220" height="1040"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene, camera, renderer, pill, clouds = [];
let tRX=0, tRY=0, cRX=0, cRY=0, tick=0;

function init(){
  const canvas = document.getElementById('c');
  const stage  = document.getElementById('stage');
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0xc9e8f8, 40, 120);

  const W = stage.clientWidth, H = stage.clientHeight;
  camera = new THREE.PerspectiveCamera(52, W/H, 0.1, 200);
  camera.position.set(0, 0, 13);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x6ab4e8, 1);

  buildSky();
  buildLights();
  buildClouds();
  buildPill();

  stage.addEventListener('mousemove', e => {
    const r = stage.getBoundingClientRect();
    tRY = ((e.clientX - r.left) / r.width  - 0.5) * 1.8;
    tRX = ((e.clientY - r.top)  / r.height - 0.5) * 1.2;
  });
  stage.addEventListener('mouseleave', () => { tRX=0; tRY=0; });
  window.addEventListener('resize', () => {
    const W=stage.clientWidth, H=stage.clientHeight;
    camera.aspect=W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H);
  });
  animate();
}

function buildSky(){
  // Deep blue top, light blue horizon gradient via two large spheres
  const skyTop = new THREE.Mesh(
    new THREE.SphereGeometry(80, 32, 16),
    new THREE.MeshBasicMaterial({ color: 0x3a8fd4, side: THREE.BackSide })
  );
  scene.add(skyTop);

  const skyHorizon = new THREE.Mesh(
    new THREE.SphereGeometry(78, 32, 8),
    new THREE.MeshBasicMaterial({ color: 0xaad8f5, side: THREE.BackSide, transparent: true, opacity: 0.55 })
  );
  skyHorizon.position.y = -20;
  scene.add(skyHorizon);
}

function buildLights(){
  scene.add(new THREE.AmbientLight(0xd6eeff, 0.7));
  const sun = new THREE.DirectionalLight(0xfff5e0, 3.5);
  sun.position.set(6, 12, 8);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x88bbff, 0.5);
  fill.position.set(-8, 3, 5);
  scene.add(fill);
  const bounce = new THREE.DirectionalLight(0xffffff, 0.3);
  bounce.position.set(0, -6, 4);
  scene.add(bounce);
}

function makePuff(x, y, z, r){
  const geo = new THREE.SphereGeometry(r, 18, 14);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 1.0,
    metalness: 0.0,
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  return m;
}

function makeCloud(x, y, z, scale){
  const g = new THREE.Group();
  // Fluffy cloud â€” many overlapping puffs
  const cfg = [
    [0,    0,    0,    1.0],
    [1.3,  0.2,  0.1, 0.88],
    [-1.2, 0.1, -0.1, 0.82],
    [0.6,  0.7,  0.0, 0.78],
    [-0.5, 0.65, 0.1, 0.72],
    [2.0,  0.1,  0.0, 0.70],
    [-1.9, 0.0,  0.0, 0.68],
    [1.0,  1.0, -0.1, 0.60],
    [-0.8, 0.95, 0.1, 0.62],
    [2.6, -0.1,  0.0, 0.55],
    [-2.5,-0.1,  0.0, 0.55],
    [0.2,  1.3,  0.0, 0.52],
    [1.5,  0.5,  0.2, 0.58],
    [-1.4, 0.5, -0.2, 0.56],
    [0.0, -0.25, 0.0, 0.85],
  ];
  cfg.forEach(([px,py,pz,pr]) => g.add(makePuff(px,py,pz,pr)));

  // Bottom shadow tint
  const shadowMat = new THREE.MeshStandardMaterial({
    color: 0xb8cfe0,
    roughness: 1.0,
    transparent: true,
    opacity: 0.45
  });
  const shadowMesh = new THREE.Mesh(new THREE.SphereGeometry(1.2, 12, 8), shadowMat);
  shadowMesh.scale.set(1.3, 0.35, 1.1);
  shadowMesh.position.set(0, -0.6, 0);
  g.add(shadowMesh);

  g.position.set(x, y, z);
  g.scale.setScalar(scale);
  clouds.push(g);
  scene.add(g);
}

function buildClouds(){
  // Background clouds â€” far, smaller
  makeCloud(-18,  3, -18, 1.6);
  makeCloud( 16,  5, -20, 2.0);
  makeCloud(  4,  6, -22, 1.4);
  makeCloud(-10,  1, -16, 1.8);
  makeCloud( 22,  2, -18, 1.3);
  makeCloud(-24,  4, -22, 1.5);

  // Midground clouds
  makeCloud(-14, -1,  -9, 1.9);
  makeCloud( 13,  2,  -8, 2.1);
  makeCloud(  0,  5,  -12, 1.7);
  makeCloud( 20, -1,  -10, 1.4);
  makeCloud(-20,  3,  -10, 1.6);

  // Foreground clouds â€” big and close, flanking the pill
  makeCloud(-10, -2,  -2, 2.4);
  makeCloud( 10, -2,  -2, 2.2);
  makeCloud( -7,  3,  -4, 1.8);
  makeCloud(  8,  3,  -4, 1.9);
}

function buildPill(){
  pill = new THREE.Group();

  // Deep coral/rose â€” stands out strongly against blue sky
  const colTop  = 0xc0455a;
  const colSide = 0xa83450;
  const colSeam = 0x6e1e32;
  const colShine= 0xd4708a;

  const matTop  = new THREE.MeshStandardMaterial({ color:colTop,  roughness:0.30, metalness:0.05 });
  const matSide = new THREE.MeshStandardMaterial({ color:colSide, roughness:0.35, metalness:0.05 });
  const matSeam = new THREE.MeshStandardMaterial({ color:colSeam, roughness:0.80, metalness:0.0  });

  const R=1.8, H=0.46, domeH=0.28;

  pill.add(new THREE.Mesh(new THREE.CylinderGeometry(R, R, H*2, 128, 1, false), matSide));

  const pts = [];
  for(let i=0; i<=56; i++){
    const t = i/56;
    pts.push(new THREE.Vector2(Math.sin(t*Math.PI/2)*R, Math.cos(t*Math.PI/2)*domeH));
  }
  const domeGeo = new THREE.LatheGeometry(pts, 128);

  const topCap = new THREE.Mesh(domeGeo, matTop);
  topCap.position.y = H; pill.add(topCap);

  const botCap = new THREE.Mesh(domeGeo, matTop);
  botCap.position.y = -H; botCap.rotation.x = Math.PI; pill.add(botCap);

  // Press seam
  const seam = new THREE.Mesh(new THREE.TorusGeometry(R, 0.022, 8, 128), matSeam);
  seam.rotation.x = Math.PI/2; pill.add(seam);

  // Specular highlight disc on top
  const hlMat = new THREE.MeshStandardMaterial({
    color: colShine, roughness: 0.05, metalness: 0.1,
    transparent: true, opacity: 0.45
  });
  const hl = new THREE.Mesh(new THREE.CircleGeometry(0.7, 32), hlMat);
  hl.rotation.x = -Math.PI/2;
  hl.position.set(-0.3, H + domeH - 0.05, -0.2);
  pill.add(hl);

  // Soft shadow disc below
  const shdMat = new THREE.MeshBasicMaterial({
    color: 0x1a3a5c, transparent: true, opacity: 0.22
  });
  const shd = new THREE.Mesh(new THREE.CircleGeometry(1.6, 40), shdMat);
  shd.rotation.x = -Math.PI/2;
  shd.position.set(0.15, -H - 0.4, 0.1);
  pill.add(shd);

  pill.position.set(0, 0.2, 0);
  scene.add(pill);
}

function animate(){
  requestAnimationFrame(animate);
  tick += 0.008;

  // Clouds drift right, wrap around
  clouds.forEach((c, i) => {
    const spd = 0.006 + (i % 4) * 0.0025;
    c.position.x += spd;
    if(c.position.x > 28) c.position.x = -28;
    c.position.y += Math.sin(tick * 0.4 + i * 0.9) * 0.0015;
  });

  cRX += (tRX - cRX) * 0.06;
  cRY += (tRY - cRY) * 0.06;

  if(pill){
    pill.rotation.x = cRX;
    pill.rotation.y = cRY;
    pill.position.y = 0.2 + Math.sin(tick) * 0.14;

    // Shadow fades as pill rises
    const shd = pill.children[pill.children.length - 1];
    shd.material.opacity = 0.22 - Math.sin(tick) * 0.05;
  }

  renderer.render(scene, camera);
}

init();
</script>
</body></html>

  makeCloud( 20, -1,  -10, 1.4);
  makeCloud(-20,  3,  -10, 1.6);

  // Foreground clouds â€” big and close, flanking the pill
  makeCloud(-10, -2,  -2, 2.4);
  makeCloud( 10, -2,  -2, 2.2);
  makeCloud( -7,  3,  -4, 1.8);
  makeCloud(  8,  3,  -4, 1.9);
}

function buildPill(){
  pill = new THREE.Group();

  // Deep coral/rose â€” stands out strongly against blue sky
  const colTop  = 0xc0455a;
  const colSide = 0xa83450;
  const colSeam = 0x6e1e32;
  const colShine= 0xd4708a;

  const matTop  = new THREE.MeshStandardMaterial({ color:colTop,  roughness:0.30, metalness:0.05 });
  const matSide = new THREE.MeshStandardMaterial({ color:colSide, roughness:0.35, metalness:0.05 });
  const matSeam = new THREE.MeshStandardMaterial({ color:colSeam, roughness:0.80, metalness:0.0  });

  const R=1.8, H=0.46, domeH=0.28;

  pill.add(new THREE.Mesh(new THREE.CylinderGeometry(R, R, H*2, 128, 1, false), matSide));

  const pts = [];
  for(let i=0; i<=56; i++){
    const t = i/56;
    pts.push(new THREE.Vector2(Math.sin(t*Math.PI/2)*R, Math.cos(t*Math.PI/2)*domeH));
  }
  const domeGeo = new THREE.LatheGeometry(pts, 128);

  const topCap = new THREE.Mesh(domeGeo, matTop);
  topCap.position.y = H; pill.add(topCap);

  const botCap = new THREE.Mesh(domeGeo, matTop);
  botCap.position.y = -H; botCap.rotation.x = Math.PI; pill.add(botCap);

  // Press seam
  const seam = new THREE.Mesh(new THREE.TorusGeometry(R, 0.022, 8, 128), matSeam);
  seam.rotation.x = Math.PI/2; pill.add(seam);

  // Specular highlight disc on top
  const hlMat = new THREE.MeshStandardMaterial({
    color: colShine, roughness: 0.05, metalness: 0.1,
    transparent: true, opacity: 0.45
  });
  const hl = new THREE.Mesh(new THREE.CircleGeometry(0.7, 32), hlMat);
  hl.rotation.x = -Math.PI/2;
  hl.position.set(-0.3, H + domeH - 0.05, -0.2);
  pill.add(hl);

  // Soft shadow disc below
  const shdMat = new THREE.MeshBasicMaterial({
    color: 0x1a3a5c, transparent: true, opacity: 0.22
  });
  const shd = new THREE.Mesh(new THREE.CircleGeometry(1.6, 40), shdMat);
  shd.rotation.x = -Math.PI/2;
  shd.position.set(0.15, -H - 0.4, 0.1);
  pill.add(shd);

  pill.position.set(0, 0.2, 0);
  scene.add(pill);
}

function animate(){
  requestAnimationFrame(animate);
  tick += 0.008;

  // Clouds drift right, wrap around
  clouds.forEach((c, i) => {
    const spd = 0.006 + (i % 4) * 0.0025;
    c.position.x += spd;
    if(c.position.x > 28) c.position.x = -28;
    c.position.y += Math.sin(tick * 0.4 + i * 0.9) * 0.0015;
  });

  cRX += (tRX - cRX) * 0.06;
  cRY += (tRY - cRY) * 0.06;

  if(pill){
    pill.rotation.x = cRX;
    pill.rotation.y = cRY;
    pill.position.y = 0.2 + Math.sin(tick) * 0.14;

    // Shadow fades as pill rises
    const shd = pill.children[pill.children.length - 1];
    shd.material.opacity = 0.22 - Math.sin(tick) * 0.05;
  }

  renderer.render(scene, camera);
}

init();
</script>
