    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      color: #fff;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: #ccc;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }
    p.sub {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }
    #stage {
      width: 500px;
      height: 420px;
      position: relative;
      cursor: none;
    }
    canvas { width: 100%; height: 100%; display: block; }
    #xhair {
      position: absolute;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .colors {
      display: flex;
      gap: 10px;
      margin-top: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .colors button {
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      color: #ccc;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.05em;
    }
    .colors button:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
  </style>

<body>
  <h1>Ecstasy — MDMA</h1>
  <p class="sub">Bewege die Maus über die Fläche</p>

  <div id="stage">
    <canvas id="c" width="1000" height="840" style="width: 500px; height: 420px;"></canvas>
    <div id="xhair" style="left: 80.5px; top: 14px; opacity: 0;">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <circle cx="9" cy="9" r="3.5" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"></circle>
        <line x1="9" y1="0" x2="9" y2="5" stroke="rgba(255,255,255,0.6)" stroke-width="1"></line>
        <line x1="9" y1="13" x2="9" y2="18" stroke="rgba(255,255,255,0.6)" stroke-width="1"></line>
        <line x1="0" y1="9" x2="5" y2="9" stroke="rgba(255,255,255,0.6)" stroke-width="1"></line>
        <line x1="13" y1="9" x2="18" y2="9" stroke="rgba(255,255,255,0.6)" stroke-width="1"></line>
      </svg>
    </div>
  </div>

  <div class="colors">
    <button onclick="setTheme('purple')">Lila</button>
    <button onclick="setTheme('pink')">Pink</button>
    <button onclick="setTheme('orange')">Orange</button>
    <button onclick="setTheme('blue')">Blau</button>
    <button onclick="setTheme('green')">Grün</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const themes = {
      purple: { top: 0x9b59b6, bottom: 0x6c3483, edge: 0xd7bde2, stamp: 0x5b2c6f },
      pink:   { top: 0xe91e8c, bottom: 0xad1457, edge: 0xf8bbd0, stamp: 0x880e4f },
      orange: { top: 0xff6b35, bottom: 0xe64a19, edge: 0xffccbc, stamp: 0xbf360c },
      blue:   { top: 0x1565c0, bottom: 0x0d47a1, edge: 0xbbdefb, stamp: 0x01579b },
      green:  { top: 0x2e7d32, bottom: 0x1b5e20, edge: 0xc8e6c9, stamp: 0x1b5e20 },
    };
    let theme = themes.purple;
    let scene, camera, renderer, tablet, xhair;
    let tRotX = 0, tRotY = 0, cRotX = 0, cRotY = 0, floating = 0;

    function setTheme(name) {
      theme = themes[name];
      if (tablet) { scene.remove(tablet); tablet = null; }
      buildTablet();
    }

    function buildTablet() {
      tablet = new THREE.Group();
      const shape = new THREE.Shape();
      const w = 1.4, h = 1.05, r = 0.28;
      shape.moveTo(-w + r, -h);
      shape.lineTo(w - r, -h);
      shape.quadraticCurveTo(w, -h, w, -h + r);
      shape.lineTo(w, h - r);
      shape.quadraticCurveTo(w, h, w - r, h);
      shape.lineTo(-w + r, h);
      shape.quadraticCurveTo(-w, h, -w, h - r);
      shape.lineTo(-w, -h + r);
      shape.quadraticCurveTo(-w, -h, -w + r, -h);

      const ext = { depth: 0.36, bevelEnabled: true, bevelThickness: 0.10, bevelSize: 0.10, bevelSegments: 12 };
      const geo = new THREE.ExtrudeGeometry(shape, ext);
      const matTop  = new THREE.MeshStandardMaterial({ color: theme.top,  roughness: 0.18, metalness: 0.15 });
      const matEdge = new THREE.MeshStandardMaterial({ color: theme.edge, roughness: 0.25, metalness: 0.10 });
      const body = new THREE.Mesh(geo, [matTop, matEdge]);
      body.position.z = -0.18;
      tablet.add(body);

      const divMat = new THREE.MeshStandardMaterial({ color: theme.stamp, roughness: 0.4 });
      const divLine = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.04, 0.02), divMat);
      divLine.position.set(0, 0, 0.20);
      tablet.add(divLine);

      addAlien();
      addSpeckles();
      scene.add(tablet);
    }

    function addAlien() {
      const mat = new THREE.MeshStandardMaterial({ color: theme.stamp, roughness: 0.5 });
      const z = 0.22, s = 0.13;

      function box(x, y, w, h) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w*s, h*s, 0.04), mat);
        m.position.set(x*s, y*s, z); tablet.add(m);
      }
      function cyl(x, y, r) {
        const m = new THREE.Mesh(new THREE.CylinderGeometry(r*s, r*s, 0.04, 16), mat);
        m.rotation.x = Math.PI/2;
        m.position.set(x*s, y*s, z); tablet.add(m);
      }
      function seg(x1, y1, x2, y2, t=0.18) {
        const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy), ang=Math.atan2(dy,dx);
        const m = new THREE.Mesh(new THREE.BoxGeometry(len*s, t*s, 0.04), mat);
        m.position.set(((x1+x2)/2)*s, ((y1+y2)/2)*s, z);
        m.rotation.z = ang; tablet.add(m);
      }

      cyl(0, 3.5, 1.6); cyl(0, 3.5, 1.0);
      box(0, 1.8, 1.0, 1.2);
      box(-1.0, 2.4, 0.6, 0.5); box(1.0, 2.4, 0.6, 0.5);
      box(-0.55, 3.5, 0.45, 0.45); box(0.55, 3.5, 0.45, 0.45);
      box(0, 0.6, 1.5, 0.5);
      box(-0.6, -0.4, 0.6, 1.2); box(0.6, -0.4, 0.6, 1.2);
      box(0, -0.3, 0.4, 0.9);
      seg(-0.3, 0.6, -0.9, -0.8); seg(0.3, 0.6, 0.9, -0.8);
      seg(-0.9, -0.8, -1.4, -2.0, 0.16); seg(0.9, -0.8, 1.4, -2.0, 0.16);
      box(-1.4, -2.4, 0.5, 0.5); box(1.4, -2.4, 0.5, 0.5);
      box(-0.4, -0.9, 0.3, 0.3); box(0.4, -0.9, 0.3, 0.3);
    }

    function addSpeckles() {
      const cols = [0xffffff, theme.edge, 0x111111];
      for (let i = 0; i < 28; i++) {
        const mat = new THREE.MeshStandardMaterial({ color: cols[i%3], roughness: 0.6, opacity: 0.5, transparent: true });
        const r = 0.025 + Math.random()*0.03;
        const m = new THREE.Mesh(new THREE.SphereGeometry(r, 6, 6), mat);
        m.position.set((Math.random()-0.5)*2.5, (Math.random()-0.5)*1.9, 0.20+Math.random()*0.02);
        tablet.add(m);
      }
    }

    function init() {
      const canvas = document.getElementById('c');
      const stage  = document.getElementById('stage');
      xhair = document.getElementById('xhair');

      scene = new THREE.Scene();
      const W = stage.clientWidth, H = stage.clientHeight;
      camera = new THREE.PerspectiveCamera(38, W/H, 0.1, 100);
      camera.position.z = 5.5;

      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);

      scene.add(new THREE.AmbientLight(0xffffff, 0.5));
      const key = new THREE.DirectionalLight(0xffffff, 2.0);
      key.position.set(3, 5, 6); scene.add(key);
      const fill = new THREE.DirectionalLight(0xaaccff, 0.8);
      fill.position.set(-4, -2, 3); scene.add(fill);
      const rim = new THREE.DirectionalLight(0xffeedd, 1.0);
      rim.position.set(0, -5, -3); scene.add(rim);

      buildTablet();

      stage.addEventListener('mousemove', e => {
        const rect = stage.getBoundingClientRect();
        tRotY = ((e.clientX - rect.left) / rect.width  - 0.5) * 1.8;
        tRotX = ((e.clientY - rect.top)  / rect.height - 0.5) * 1.3;
        xhair.style.left = (e.clientX - rect.left) + 'px';
        xhair.style.top  = (e.clientY - rect.top)  + 'px';
        xhair.style.opacity = '1';
      });
      stage.addEventListener('mouseleave', () => { tRotX = 0; tRotY = 0; xhair.style.opacity = '0'; });
      window.addEventListener('resize', () => {
        const W = stage.clientWidth, H = stage.clientHeight;
        camera.aspect = W/H; camera.updateProjectionMatrix(); renderer.setSize(W, H);
      });

      (function loop() {
        requestAnimationFrame(loop);
        cRotX += (tRotX - cRotX) * 0.07;
        cRotY += (tRotY - cRotY) * 0.07;
        floating += 0.012;
        if (tablet) {
          tablet.rotation.x = cRotX;
          tablet.rotation.y = cRotY;
          tablet.position.y = Math.sin(floating) * 0.06;
        }
        renderer.render(scene, camera);
      })();
    }

    init();
  </script>

      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.05em;
    }
    .colors button:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <h1>Ecstasy — MDMA</h1>
  <p class="sub">Bewege die Maus über die Fläche</p>

  <div id="stage">
    <canvas id="c" width="1000" height="840" style="width: 500px; height: 420px;"></canvas>
    <div id="xhair" style="left: 80.5px; top: 14px; opacity: 0;">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <circle cx="9" cy="9" r="3.5" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"></circle>
        <line x1="9" y1="0" x2="9" y2="5" stroke="rgba(255,255,255,0.6)" stroke-width="1"></line>
        <line x1="9" y1="13" x2="9" y2="18" stroke="rgba(255,255,255,0.6)" stroke-width="1"></line>
        <line x1="0" y1="9" x2="5" y2="9" stroke="rgba(255,255,255,0.6)" stroke-width="1"></line>
        <line x1="13" y1="9" x2="18" y2="9" stroke="rgba(255,255,255,0.6)" stroke-width="1"></line>
      </svg>
    </div>
  </div>

  <div class="colors">
    <button onclick="setTheme('purple')">Lila</button>
    <button onclick="setTheme('pink')">Pink</button>
    <button onclick="setTheme('orange')">Orange</button>
    <button onclick="setTheme('blue')">Blau</button>
    <button onclick="setTheme('green')">Grün</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const themes = {
      purple: { top: 0x9b59b6, bottom: 0x6c3483, edge: 0xd7bde2, stamp: 0x5b2c6f },
      pink:   { top: 0xe91e8c, bottom: 0xad1457, edge: 0xf8bbd0, stamp: 0x880e4f },
      orange: { top: 0xff6b35, bottom: 0xe64a19, edge: 0xffccbc, stamp: 0xbf360c },
      blue:   { top: 0x1565c0, bottom: 0x0d47a1, edge: 0xbbdefb, stamp: 0x01579b },
      green:  { top: 0x2e7d32, bottom: 0x1b5e20, edge: 0xc8e6c9, stamp: 0x1b5e20 },
    };
    let theme = themes.purple;
    let scene, camera, renderer, tablet, xhair;
    let tRotX = 0, tRotY = 0, cRotX = 0, cRotY = 0, floating = 0;

    function setTheme(name) {
      theme = themes[name];
      if (tablet) { scene.remove(tablet); tablet = null; }
      buildTablet();
    }

    function buildTablet() {
      tablet = new THREE.Group();
      const shape = new THREE.Shape();
      const w = 1.4, h = 1.05, r = 0.28;
      shape.moveTo(-w + r, -h);
      shape.lineTo(w - r, -h);
      shape.quadraticCurveTo(w, -h, w, -h + r);
      shape.lineTo(w, h - r);
      shape.quadraticCurveTo(w, h, w - r, h);
      shape.lineTo(-w + r, h);
      shape.quadraticCurveTo(-w, h, -w, h - r);
      shape.lineTo(-w, -h + r);
      shape.quadraticCurveTo(-w, -h, -w + r, -h);

      const ext = { depth: 0.36, bevelEnabled: true, bevelThickness: 0.10, bevelSize: 0.10, bevelSegments: 12 };
      const geo = new THREE.ExtrudeGeometry(shape, ext);
      const matTop  = new THREE.MeshStandardMaterial({ color: theme.top,  roughness: 0.18, metalness: 0.15 });
      const matEdge = new THREE.MeshStandardMaterial({ color: theme.edge, roughness: 0.25, metalness: 0.10 });
      const body = new THREE.Mesh(geo, [matTop, matEdge]);
      body.position.z = -0.18;
      tablet.add(body);

      const divMat = new THREE.MeshStandardMaterial({ color: theme.stamp, roughness: 0.4 });
      const divLine = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.04, 0.02), divMat);
      divLine.position.set(0, 0, 0.20);
      tablet.add(divLine);

      addAlien();
      addSpeckles();
      scene.add(tablet);
    }

    function addAlien() {
      const mat = new THREE.MeshStandardMaterial({ color: theme.stamp, roughness: 0.5 });
      const z = 0.22, s = 0.13;

      function box(x, y, w, h) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w*s, h*s, 0.04), mat);
        m.position.set(x*s, y*s, z); tablet.add(m);
      }
      function cyl(x, y, r) {
        const m = new THREE.Mesh(new THREE.CylinderGeometry(r*s, r*s, 0.04, 16), mat);
        m.rotation.x = Math.PI/2;
        m.position.set(x*s, y*s, z); tablet.add(m);
      }
      function seg(x1, y1, x2, y2, t=0.18) {
        const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy), ang=Math.atan2(dy,dx);
        const m = new THREE.Mesh(new THREE.BoxGeometry(len*s, t*s, 0.04), mat);
        m.position.set(((x1+x2)/2)*s, ((y1+y2)/2)*s, z);
        m.rotation.z = ang; tablet.add(m);
      }

      cyl(0, 3.5, 1.6); cyl(0, 3.5, 1.0);
      box(0, 1.8, 1.0, 1.2);
      box(-1.0, 2.4, 0.6, 0.5); box(1.0, 2.4, 0.6, 0.5);
      box(-0.55, 3.5, 0.45, 0.45); box(0.55, 3.5, 0.45, 0.45);
      box(0, 0.6, 1.5, 0.5);
      box(-0.6, -0.4, 0.6, 1.2); box(0.6, -0.4, 0.6, 1.2);
      box(0, -0.3, 0.4, 0.9);
      seg(-0.3, 0.6, -0.9, -0.8); seg(0.3, 0.6, 0.9, -0.8);
      seg(-0.9, -0.8, -1.4, -2.0, 0.16); seg(0.9, -0.8, 1.4, -2.0, 0.16);
      box(-1.4, -2.4, 0.5, 0.5); box(1.4, -2.4, 0.5, 0.5);
      box(-0.4, -0.9, 0.3, 0.3); box(0.4, -0.9, 0.3, 0.3);
    }

    function addSpeckles() {
      const cols = [0xffffff, theme.edge, 0x111111];
      for (let i = 0; i < 28; i++) {
        const mat = new THREE.MeshStandardMaterial({ color: cols[i%3], roughness: 0.6, opacity: 0.5, transparent: true });
        const r = 0.025 + Math.random()*0.03;
        const m = new THREE.Mesh(new THREE.SphereGeometry(r, 6, 6), mat);
        m.position.set((Math.random()-0.5)*2.5, (Math.random()-0.5)*1.9, 0.20+Math.random()*0.02);
        tablet.add(m);
      }
    }

    function init() {
      const canvas = document.getElementById('c');
      const stage  = document.getElementById('stage');
      xhair = document.getElementById('xhair');

      scene = new THREE.Scene();
      const W = stage.clientWidth, H = stage.clientHeight;
      camera = new THREE.PerspectiveCamera(38, W/H, 0.1, 100);
      camera.position.z = 5.5;

      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);

      scene.add(new THREE.AmbientLight(0xffffff, 0.5));
      const key = new THREE.DirectionalLight(0xffffff, 2.0);
      key.position.set(3, 5, 6); scene.add(key);
      const fill = new THREE.DirectionalLight(0xaaccff, 0.8);
      fill.position.set(-4, -2, 3); scene.add(fill);
      const rim = new THREE.DirectionalLight(0xffeedd, 1.0);
      rim.position.set(0, -5, -3); scene.add(rim);

      buildTablet();

      stage.addEventListener('mousemove', e => {
        const rect = stage.getBoundingClientRect();
        tRotY = ((e.clientX - rect.left) / rect.width  - 0.5) * 1.8;
        tRotX = ((e.clientY - rect.top)  / rect.height - 0.5) * 1.3;
        xhair.style.left = (e.clientX - rect.left) + 'px';
        xhair.style.top  = (e.clientY - rect.top)  + 'px';
        xhair.style.opacity = '1';
      });
      stage.addEventListener('mouseleave', () => { tRotX = 0; tRotY = 0; xhair.style.opacity = '0'; });
      window.addEventListener('resize', () => {
        const W = stage.clientWidth, H = stage.clientHeight;
        camera.aspect = W/H; camera.updateProjectionMatrix(); renderer.setSize(W, H);
      });

      (function loop() {
        requestAnimationFrame(loop);
        cRotX += (tRotX - cRotX) * 0.07;
        cRotY += (tRotY - cRotY) * 0.07;
        floating += 0.012;
        if (tablet) {
          tablet.rotation.x = cRotX;
          tablet.rotation.y = cRotY;
          tablet.position.y = Math.sin(floating) * 0.06;
        }
        renderer.render(scene, camera);
      })();
    }

    init();
  </script>


</body></html>
